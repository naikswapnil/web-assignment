<!DOCTYPE html>
<html>
<head>

<title>Facebook Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
display:flex;
align-items:center;
gap:120px;
}

.left h1{
color:#1877f2;
font-size:60px;
margin-bottom:10px;
}

.left p{
font-size:30px;
}

.login-box{
background:white;
padding:20px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
font-size:18px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.login{
width:100%;
padding:15px;
background:#1877f2;
color:white;
font-size:20px;
border:none;
border-radius:6px;
}

.link{
text-align:center;
margin:15px 0;
color:#1877f2;
}

hr{
margin:20px 0;
}

.create{
display:block;
margin:auto;
padding:15px;
background:#42b72a;
color:white;
font-size:18px;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="left">
<h1>facebook</h1>
<p>Connect with friends and the world around you on Facebook.</p>
</div>

<div class="login-box">

<input type="text" placeholder="Email address">

<input type="password" placeholder="Password">

<button class="login">Log In</button>

<div class="link">Forgotten password?</div>

<hr>

<button class="create">Create new account</button>

</div>

</div>

</body>
</html>
