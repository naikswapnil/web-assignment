<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parameterized Function</title>
</head>

<body>

    <h1>Parameterized Function</h1>

    <div>
        <p id="result"></p>
    </div>

    <script>

        function add(a, b, c = 10) {
            return a + b + c;
        }

        document.getElementById("result").innerHTML = add(5, 10);

    </script>

</body>

</html>
