<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Example</title>
</head>

<body>

    <h2>Student Behavior</h2>

    <label>Enter your Name:</label>
    <input type="text" id="student_name" name="student_name"><br><br>

    <button type="button" onclick="behavior()">Submit</button>

    <br><br>

    <span id="result"></span>

    <script>

        function behavior() {

            let name = document.getElementById("student_name").value;

            document.getElementById("result").innerHTML =
                "Good.<br>" +
                name + " is sincere.<br>" +
                name + " is Regular.";

        }

    </script>

</body>

</html>
