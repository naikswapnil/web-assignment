<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>

    <h1>For Loop</h1>

    <div id="loop">
        <p id="values">Values Entered:</p>
    </div>

    <script>
        for (let i = 0; i <= 10; i++)
         {
            document.getElementById("values").innerHTML += i + "<br>";
        }
    </script>

</body>
</html>
