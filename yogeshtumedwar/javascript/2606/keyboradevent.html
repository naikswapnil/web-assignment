<!DOCTYPE html>
<html>
    <head>
        <title>Key Event</title>
    </head>
    <style>
         body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            
        }

        .container {
            background-color: white;
            width: 400px;
           
            text-align: center;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }
         h1 {
            margin-bottom: 20px;
            color: #333;
        }
    </style>
<body>
    <div class="keyevents">
        <!--KEYBOARD EVENT-->
        <label>Enter Name</label> 
        <input type="text" id="name" name="name" onkeydown="alert('key pressed')"> <br>
         
        <!--MOUSE EVENT-->
        <label>Enter Email</label> 
        <input type="text" id="email" name="email" onfocus="alert('focused')"> <br>
       
        <!--KEYBOARD EVENT-->  
        <label>Enter Password</label> 
        <input type="password" id="password" name="password" onkeyup ="alert('key uped')"> <br>
    
        <label>Contact</label>
        <input type="number" id="contact" name="contact" onmouseover="alert('hovered')"> <br>

        <button type="button" onclick="alert('pressed')">submit</button>

    </div>
</body>
</html>
