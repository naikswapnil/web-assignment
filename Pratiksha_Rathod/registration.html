<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <h1>Student Registration Form:</h1>
</head>
<body>
    <!--Assignment-3-->
    <fieldset>
    <legend>Registration Details</legend>
    <form action="#" method="get">
        <label for="">Full Name:</label>
        <input type="text" id="fname" placeholder="Enter your Full Name"><br><br>

        <label for="">Email:</label>
        <input type="email" id="email" placeholder="Enter your Email"><br><br>

        <label for="">Password:</label>
        <input type="password" id="password" placeholder="Enter your Password"><br><br>

        <label for="">Confirm password:</label>
        <input type="password" id="cpassword" placeholder="Confirm Password"><br><br>

        <label for="">Mobile Number:</label>
        <input type="tel" id="mobile" placeholder="Enter your Mobile Number"><br><br>

        <label for="">Date of Birth:</label>
        <input type="date" id="dob" placeholder="Enter your Date of Birth"><br><br>

        <label for="">Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other">
        <label for="Other">Other</label><br><br>

        <label for="">Course:</label>
        <select id="Course">
            <option>Select Course</option>
            <option>Flutter Mobile App Development</option>
            <option>UI/UX Design</option>
            <option>Web Fullstack Development</option>
            <option>Python+AI/ML Development</option>
            <option>Java Development</option>
        </select><br><br>

        <label>Hobbies:</label><br>
        <input type="checkbox" id="reading">
        <label for="">Reading</label>
        <input type="checkbox" id="music">
        <label for="">Music</label>
        <input type="checkbox" id="sports">
        <label for="">sports</label><br><br>

        <label for="">Address:</label><br>
        <textarea id="address" rows="5" cols="30" placeholder="Enter your Address"></textarea><br><br>

        <label for="">Profile Photo:</label>
        <input type="file" id="photo"><br><br>

        <input type="Submit" value="Submit">
        <input type="reset" value="Reset">
        </form>
        </fieldset>
</body>
</html>
