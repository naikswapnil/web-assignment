<!DOCTYPE html>
<html>
<head>
<title>Bus Ticket Booking System</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:400px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#result{
    margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<h2>Bus Ticket Booking System</h2>

<label>Passenger Name</label>
<input type="text" id="name">

<label>Age</label>
<input type="number" id="age">

<label>Ticket Type</label>
<select id="ticketType">
<option value="">Select</option>
<option value="300">Regular</option>
<option value="500">Sleeper</option>
<option value="800">AC</option>
</select>

<label>Number of Tickets</label>
<input type="number" id="tickets">

<button onclick="bookTicket()">Book Ticket</button>

<div id="result"></div>

</div>

<script>

function bookTicket(){

let name=document.getElementById("name").value;
let age=parseInt(document.getElementById("age").value);
let price=parseInt(document.getElementById("ticketType").value);
let tickets=parseInt(document.getElementById("tickets").value);

if(name=="" || age<=0 || isNaN(price) || tickets<=0){
    document.getElementById("result").innerHTML=
    "Please fill all fields properly.";
    return;
}

let total=price*tickets;
let discount=0;

if(age<5){
    discount=total;
}
else if(age>=5 && age<=12){
    discount=total*0.50;
}
else if(age>=60){
    discount=total*0.30;
}

let payable=total-discount;

document.getElementById("result").innerHTML=
"<h3>Booking Details</h3>"+
"Passenger Name: "+name+"<br>"+
"Age: "+age+"<br>"+
"Ticket Price: ₹"+price+"<br>"+
"Number of Tickets: "+tickets+"<br>"+
"Total Amount: ₹"+total+"<br>"+
"Discount: ₹"+discount+"<br>"+
"Final Payable Amount: ₹"+payable;
}
</script>

</body>
</html>
