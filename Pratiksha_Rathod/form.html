<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML form</title>
    <h1>HTML form</h1>
</head>
<body>
    <fieldset>
    <form action="/submit.php" method="get"> <!--get ha browser vr output bagnya sathi use kartat-->
        <label for="">First Name:</label>
        <input type="text" id="fname" placeholder="Enter your First Name"><br><br>

        <label for="">Last Name:</label>
        <input type="text" id="lname" placeholder="Enter your Last Name"><br><br>

        <label for="">Email:</label>
        <input type="email" id="email" placeholder="Enter your Email"><br><br>

        <label for="">Password:</label>
        <input type="password" id="password" placeholder="Enter your Password"><br><br>

        <label for="">Gender</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <label for="address">Address</label><br>
        <textarea name="address" id="address" cols="20" rows="5" placeholder="Enter your address"></textarea><br><br>

        <input type="submit" id="submit" name="submit" value="submit">
        </form>
        </fieldset>
</body>
</html>
