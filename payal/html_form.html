<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<center>
    <h2>STUDENT REGISTRATION FORM</h2>
</center>
<hr>

<form>

<label>Full Name:</label>
<input type="text" size="30"><br><br>

<label>Email:</label>
<input type="email" size="30"><br><br>

<label>Password:</label>
<input type="password" size="30"><br><br>

<label>Confirm Password:</label>
<input type="password" size="30"><br><br>

<label>Mobile Number:</label>
<input type="tel" size="30"><br><br>

<label>Date of Birth:</label>
<input type="date"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male<br>
<input type="radio" name="gender"> Female<br>
<input type="radio" name="gender"> Other<br><br>

<label>Course:</label><br>
<select>
    <option>Select Course</option>
    <option>BCA</option>
    <option>B.Tech</option>
    <option>B.Sc</option>
    <option>B.Com</option>
    <option>MCA</option>
</select>

<br><br>

<label>Hobbies:</label><br>
<input type="checkbox"> Reading<br>
<input type="checkbox"> Sports<br>
<input type="checkbox"> Music<br><br>

<label>Address:</label><br>
<textarea rows="4" cols="50"></textarea>

<br><br>

<label>Profile Photo:</label><br>
<input type="file">

<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

<hr>

</body>
</html>
