<!DOCTYPE html>
<html>
<head>
<title>Facebook Login Clone</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f0f2f5;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:80px;
}

.left h1{
    color:#1877f2;
    font-size:55px;
}

.left p{
    font-size:24px;
}

.login-box{
    background:white;
    padding:20px;
    width:350px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#1877f2;
    color:white;
    border:none;
    border-radius:5px;
}

.create-btn{
    width:100%;
    padding:12px;
    background:#42b72a;
    color:white;
    border:none;
    border-radius:5px;
    margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="left">
<h1>facebook</h1>
<p>Connect with friends and the world around you on Facebook.</p>
</div>

<div class="login-box">
<input type="text" placeholder="Email or Phone">
<input type="password" placeholder="Password">
<button class="login-btn">Log In</button>
<br><br>
<center><a href="#">Forgotten password?</a></center>
<hr>
<button class="create-btn">Create New Account</button>
</div>

</div>
</body>
</html>
