<!DOCTYPE html>
<html>

<head>
    <style>

        .card{
            width: 300px;
            padding: 20px;
            margin: 30px auto;

            border: 3px solid #3498db;
            border-radius: 10px;

            outline: 2px dashed red;
            outline-offset: 5px;

            box-sizing: border-box;
        }

    </style>
</head>

<body>

    <div class="card">
        <h2>CSS Box Model Example</h2>

        <p>
            This element demonstrates margin,
            border, padding, outline, and sizing.
        </p>
    </div>

</body>

</html>
