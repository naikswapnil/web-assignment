<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counter App</title>
    <style>
        .container{
            border: 1px solid;
            width: 700px;
            height: 300px;
            background-color: #f0f2f5;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            border: 0px;
            width: 250px;
            height: 200px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px gray;
            padding: 10px;
            margin: 20px;
            background-color: white;

        }
        .box h1{ 
            text-align: center;

        }
        .box h2{
            text-align: center;
        }
        .bt{
            display: flex;
            justify-content: space-around;
        }
        .in{
           background-color: green;
           border: 0px;
           width: 70px;
           height: 30px;
           border-radius: 5px;
           color: white;
           
        }
        .de{
           background-color:  red;
            border: 0px;
             width: 70px;
           height: 30px;
            border-radius: 5px;
            color: white;
            
        }
        .re{
           background-color: blue;
           border: 0px;
            width: 70px;
           height: 30px;
           border-radius: 5px;
           color: white;
        }

    </style>
</head>
<body>
    <div class="container">
    <div class="box">
        <h1>Counter App</h1>
        <h2 id="count"><b>0</b></h2>
        <div class="bt">
           <button class="in" onclick="increase();">Increase</button>
           <button class="de" onclick="decrease();">Decrease</button>
           <button class="re" onclick="reset();">Reset</button>
        </div>
    </div>
    <script>
        let counter=0;
        function increase(){
            counter++;
            document.getElementById("count").innerHTML=counter;
        }
        function decrease(){
            counter--;
            document.getElementById("count").innerHTML=counter;
        }
         function reset(){
            counter=0;
            document.getElementById("count").innerHTML=counter;
        }
   
       </script>
</div> 
</body>
</html>
