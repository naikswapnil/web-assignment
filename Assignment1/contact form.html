<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
    </head>
    <body>
    <fieldset> 
    <h1 style="border:1px solid black; text-align:center;">Contact Us</h1> 
    <form>
    <lable for="fullname">Full Name:</lable>
    <input type="text" id="fullname" placeholder="Enter your name"><br><br>
    <lable for="Email">Email:</lable>
    <input type="Email" id="Email" placeholder="Enter your email"><br><br>
    <lable for="Phone">Phone Number:</lable>
    <input type="tel" id="Mobile No" disable placeholder="Enter your Mobile No"><br><br>
    <lable for="sub">Subject:</lable>
    <input type="text" id="sub" placeholder="Enter your subject"><br><br>
    <lable for="city">City:</lable>
    <select>
    <option>Select City</option> 
    <option>Nanded</option> 
    <option>Nashik</option> 
    <option>Pune</option> 
    <option>Mumbai</option> 
    </select><br><br>
    <lable for="message">Message:</lable><br>
    <textarea type="text" id="message" cols="15" rows="5" placeholder="Enter a message"></textarea><br><br>
    <input type="button" value="Submit">
    <button>Clear</button>
    </form> 
    </fieldset>
   </body>
   </html>
