<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu card</title>
    <style>
        table{
            width:300px;
            height:500px;
            border-collapse:collapse;
        }
        th,tr,td{
         border:2px solid black;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center"><b><u>Restaurant Menu Card</u></b></h1>
    <center> 
<table>
    <tr>
        <th>Image</th>
        <th>Item</th>
        <th>Prize</th>
    </tr>
    <tr> 
    <td><center><img src="Pizza.jpg" width="150" height="100"></center></td>
    <td style="text-align: center;"><b>Pizza</b></td>
    <td style="text-align: center;"><b>&#8377;250</b></td>
    </tr>
    <tr> 
    <td><center><img src="Burger.jpg" width="150" height="100"></center></td>
    <td style="text-align: center;"><b>Bargar</b></td>
    <td style="text-align: center;"><b>&#8377;150</b></td>
    </tr>
    <tr> 
    <td><center><img src="sandwitch.jpg" width="150" height="100"></center></td>
    <td style="text-align: center;"><b>sandwitch</b></td>
    <td style="text-align: center;"><b>&#8377;100</b></td>
    </tr>
    <td><center><img src="cold.jpg" width="150" height="120"></center></td>
    <td style="text-align: center;"><b>Cold Drink</b></td>
    <td style="text-align: center;"><b>&#8377;50</b></td>
    </tr>
</table>
</center>
</body>
</html>
