<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwani time table</title>
    <style>
        table{
            width:500px;
            height:250px;
            border-collapse:collapse;
        }
        tr,th,td{
            border:1px solid black;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Dwani Time Table</h1>
    <center> 
    <table border="1">
        <tr>
            <th rowspan="2">Time</th>
            <th colspan="4">Courses</th>
        </tr>
        <tr>
           <th>Batch</th>
            <th>Course Name</th>    
            <th>Duration</th>  
        </tr> 
        <tr>
          <td style="text-align:center">10:00 AM - 12:00 PM</td>
          <td style="text-align:center">Batch 1</td>
          <td>Flutter Devlopment</td>    
          <td style="text-align:center">2 Hours </td>  
        </tr>
        <tr>
          <td style="text-align:center">12:00 PM - 02:00 PM</td>
          <td style="text-align:center">Batch 2</td>
          <td>Web Full stack Devlopment</td>    
          <td style="text-align:center">2 Hours </td> 
        </tr>
        <tr>
          <td style="text-align:center">02:00 PM - 04:00 PM</td>
          <td style="text-align:center">Batch 3</td>
          <td>Python Devlopment</td>    
          <td style="text-align:center">2 Hours </td> 
        </tr>  
        <tr>
            <th colspan="4">Dwani Technologies Daily Traning Schedule</th>
        </tr>
    </table>
    </center>
</body>
</html>
