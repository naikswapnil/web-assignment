<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <h2 style="text-align: center;">STUDENT REGISTRATION FORM</h2>
    <br>
     <fieldset> 
     <form>
        <label for="fullname">Full name:</label><br>
        <input type="text" id="fullname" name="fullname" placeholder="enter your full name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="enter your email"><br><br>

        <label for="password">Password: </label><br>
         <input type="password" id="password" name="password" placeholder="enter your password"><br><br>

        <label for=" confirm password">Confirm password: </label><br>
         <input type="password" id="confirm password" name="confirm password" placeholder="confirm password"><br><br>

        <label for="Mobile Number">Mobile Number : </label><br>
         <input type="tel" id="Mobile Number" name="Mobile Number" placeholder="enter your Mobile Number"><br><br>

        <label for="date of birth">Date of Birth: </label><br>
        <input type="date" id="date of birth" name="date of birth" placeholder="enter your date of birth"><br><br>

        <label for="gender">Gender:</label><br>
        <input type="radio" id="gender" name="gender">
        <label for="">Male</label><br>

         <input type="radio" id="gender" name="gender">
        <label for="">Female</label><br>

         <input type="radio" id="gender" name="gender">
        <label for="">Other</label><br><br>

        <label for="course">Course:</label>
        <select id="course" name="course">
            <option selected>select course</option>
            <option value="web">Web Development</option>
            <option value="java">Java</option>
            <option value="python">Python</option>
            <option value="sql">SQL</option>
        </select><br><br>

        <label for="hobbies">Hobbies:</label><br>

        <input type="checkbox" id="hobbies" name="hobbies">
        <label for="">Reading</label><br>

         <input type="checkbox" id="hobbies" name="hobbies">
        <label for="">Sports</label><br>

         <input type="checkbox" id="hobbies" name="hobbies">
        <label for="">Music</label><br><br>
        <address>
            <label for="address">Address</label><br>
            <textarea name="address" id="address" cols="40" rows="5" placeholder="Enter your address"></textarea>
        </address><br>

        <label for="photo">Profile photo:</label><br>
        <input type="file" id="photo" name="photo"><br><br>
        
        <input type="submit" value="submit">
        <input type="reset" value="reset">  
     </form>
     </fieldset>
    
</body>
</html>
