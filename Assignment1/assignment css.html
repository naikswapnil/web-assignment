<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 1px solid;
            background-color: #0f0f0f;
            width: 900px;
            height: 420px;
            border-radius: 20px;
            padding-right: 10px;
        }
        .box{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        .box h1{
            position: sticky;
            top: 0;
            left: 0;
            color: red;
            font-size: 20px;
        }
        .box p{
            position: sticky;
            top: 0;
            left: 0;
            border: 1px solid gray;
            width: 380px;
            height: 32px;
            border-radius: 40px;
            border-color: rgb(169, 169, 168);
        }
        .box h2{
            position: sticky;
            top: 1px;
            left: 1px;
            border: 1px solid;
            width: 35px;
            height: 35px;
            border-radius: 50px;
            border-color: blueviolet;
            background-color: blueviolet;   
        }
        .vr{
            display: flex;
            gap: 20px;
        }
        .vr_left_side{
         display: flex;
         flex-direction: column;
         gap: 20px;
         padding: 5px;
        
        }
        .vr_box{
            border: 1px solid;
            border-color:  rgb(169, 169, 168);;
            width: 50px;
            height: 30px;
            border-radius: 10px;   
        }
        #white{
            background-color: white;
            border-color: white;
        }
        .vertical{
            border: 1px solid;
            border-color: rgb(169, 169, 168); 
            width: 0px;
            height: 250px;
        }
        .hr{
            padding: 10px;
             display: flex;
             gap: 30px;  
        }
        .hr_box{
            border: none;
            background-color: #a3a0a036;
            min-width: 40px;
            min-height: 20px;
            border-radius: 6px; 
            color: white; 
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #wh{
            background-color: white;
            border-color: white;
            color: black;  
        }

        .big{
            display: flex;
            justify-content: flex-start;
            gap: 15px;
        }

        .first, .second,.third{
            border: 1px solid;
            width: 160px;
            height: 100px;
        }
       .first{
           background-color: rgb(56, 138, 231);
            border-radius: 10px;
        }
        .second{
           background-color: rgb(61, 194, 121);
            border-radius: 10px;   
        }
        .third{
           background-color: rgb(235, 51, 149);
            border-radius: 10px;
        }

        .first_box,.second_box,.third_box{
             display: flex;
             flex-direction: column;
            
        }

        .text1,.text2,.text3{
            display: flex;
            align-items: flex-start;
            margin-top: 8px;
            gap: 8px;
            padding: 7px;
        }

        .text1 h3,
        .text2 h3,
        .text3 h3{
        margin: 0;
        color: white;
        font-size: 12px;
      }
      .circle1,.circle2,.circle3{
        border: 1px solid;
           width: 22px;
           height: 22px;
           margin-top: 1px;
        border-radius: 50%;
      } 

      .text1 p,
      .text2 p,
      .text3 p{
        margin-top: 3px;
        color: gray;
        font-size: 10px;
        line-height: 15px;
      }
       
       
        .circle1{
           background-color: red;
           
        } 
       

        .circle2{
           background-color: rgb(255, 196, 0);
            
        }
      


        .circle3{
           background-color: rgb(0, 140, 255);
           
        }
       

    </style>
</head>
<body>
    <div class="container">
           <div class="box">
               <h1>&#9654 YouTube</h1>
               <p ></p>
               <h2></h2>
           </div><hr>

        <div class="vr">

                <div class="vr_left_side">
                  <div class="vr_box" id="white"></div>
                  <div class="vr_box"></div>
                  <div class="vr_box"></div>
               </div>


                <div class="vertical"> </div>

                <div class="vr_rigtht_side">

                               <div class="hr">
                                    <div class="hr_box" id="wh">All</div>
                                    <div class="hr_box">Gaming</div>
                                    <div class="hr_box">Music</div>
                                    <div class="hr_box">Live</div>
                              </div>


                     <div class="big">
                              <div class="first_box">

                                    <div class="first"></div>

                                    <div class="text1">
                                          <div class="circle1"></div>

                                          <div>
                                            <h3>Learn HTML & CSS</h3>
                                            <p>Tech Channel<br>
                                            120K views &bull; 2 days ago </p>
                                          </div>

                                    </div>
                              </div>

                                <div class="second_box">
                                      <div class="second"></div>

                                      <div class="text2">

                                           <div class="circle2"></div>

                                             <div>
                                               <h3>Bulding a Travel <br>App</h3>
                                               <p>Code Master<br>
                                               45K views &bull; 5 houre ago </p>
                                             </div>

                                      </div>
                                </div>

                                <div class="third_box">

                                    <div class="third"></div>

                                    <div class="text3">

                                           <div class="circle3"></div>

                                             <div>
                                               <h3>Lofi Hip Hop Radio</h3>
                                               <p>Chill Vibes<br>14K Watching </p>
                                             </div>

                                      </div>
                                        
                                </div>
                      </div>
               </div>
        </div
    </div>
</body>
</html>
