<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      #container{
        margin-top: 20px;
        border: 0px solid;
        width: 350px;
        min-height: 350px;
        border-radius: 10px;
        background-color: white;
        box-shadow: 2px 2px 10px gray;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

      }
      h1,img{
        margin-top: 20px;
      }
      input{
        width: 300px;
        height: 30px;
        border-radius: 3;
      }
      select{
        width: 310px;
        height: 31px;
        border-radius: 3;
      }
      button{
        color: white;
        background-color: green;
        border: 0px;
        width: 310px;
        height: 31px;
      }
      #details{
        margin-top: 10px;
        
      }
    </style>
</head>
<body>
 <center>
  <div id="container">
    
    <h1 style="font-size: 25px;"><img src="bus.webp" width="30px" height="21px">&nbsp;Bus Ticket Booking System</h1>
    <form>
    <input type="text" id="pname" name="pname" placeholder="Passenger Name"><br><br>
    <input type="number" id="age" name="age" placeholder="Age"><br><br>
    <select id="ttype" name="ttype">
      <option selected>Select Ticket Type</option>
      <option> Non-AC Seater</option>
      <option>AC Seater</option>
      <option> Sleeper</option>
      <option> AC Sleeper</option>
      <option> Semi-Sleeper</option>
      <option>Seater-Sleeper </option>
      <option>Volvo</option>
      <option>Multi-Axle AC</option>
      <option>Deluxe</option>
      <option>Super Luxury</option>
      <option>Express</option>
      <option>Electric Bus</option>
      <option>Reserved Ticket</option>
      <option>M-Ticket</option>
      <option>Counter Tickets</option>
    </select><br><br>
    <input type="number" id="tickets" name="tickets" placeholder="Number of Tickets"><br><br>

    <button type="button" onclick="print();">Book Ticket</button>
    </form>

    <div id="details">
    <p id="name"></p>
    <p id="ag"></p>
    <p id="type"></p>
    <p id="Ticket"></p>
    <p id="total"></p>
    <p id="discount"></p>
    <p id="payable"></p>
  </div>
  </div> 
  </center> 
  <script>
    function print(){
  
      let pnm=document.getElementById("pname").value;
      document.getElementById("name").innerHTML="<h3><b>Ticket Details</b></h3>"+"Passenger Name: "+pnm;

      let Age=document.getElementById("age").value;
      document.getElementById("ag").innerHTML="Age:"+Age;

      let ticket=document.getElementById("ttype").value;
      document.getElementById("type").innerHTML="Ticket Type: "+ticket;

      let not=document.getElementById("tickets").value;
      document.getElementById("Ticket").innerHTML="Number of Ticket: "+not;

      let price=300;
      let total=price*not;
      let discount=0;
      if(not>=5)
     {
      discount=total*0.10;
     }

     let payable=total-discount;
      
     document.getElementById("total").innerHTML="Total Amount: "+total;
     document.getElementById("discount").innerHTML="Discount: "+discount;
     document.getElementById("payable").innerHTML="Payable Amount: "+payable;

    }
  </script>
   
</body>
</html>
