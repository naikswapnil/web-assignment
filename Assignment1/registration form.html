<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body><br><br>
    <hr>
    <h1>Student registration form</h1>
    <hr>
    <form>
        <lable for="Fullname">Full Name:</lable>
        <input type="text" id="Fullname" placeholder="Enter your name"><br><br>
        <lable for="mail">Email Address:</lable>
        <input type="Email" id="mail" placeholder="Enter your Email address"><br><br>
        <lable for="password">Password:</lable>
        <input type="password" id="password" placeholder="Enter your password"><br><br>
        <lable for="password">Confirm Password:</lable>
        <input type="password" id="password" placeholder="Enter your confirm password"><br><br>
        <lable for="tel">Mobile Number:</lable>
        <input type="tel" id="tel" placeholder="Enter your Mobile no"><br><br>
        <lable for="DOB">Date of Birth:</lable>
        <input type="Date" id="Date" placeholder=""><br><br>
        <lable for="Gender">Gender:</lable><br>
        <input type="radio" id="male" name="Gender" value="Male">
        <lable for="male">Male</lable><br>
        <input type="radio" id="female" name="Gender" Value="Female">
        <lable for="female">Female</lable><br>
        <input type="radio" id="other" name="Gender" Value="Other">
        <lable for="other">Other</lable><br><br>
        <lable for="Course">Course</lable><br>
        <select>
            <option>Information Technology</option>
            <option>Electrical Engineering</option>
            <option>Electronic Engineering</option>
            <option>Computer Engineering</option>
            <option>Civil Engineering</option>
            <option>Mechanical Engineering</option>
        </select><br><br>
        <lable for="">Hobbies:</lable><br>
        <input type="checkbox" id="hobbies" name="hobbies" value="Reading"></input>
        <lable for="hobbies">Reading</lable><br>
        <input type="checkbox" id="hobbies" name="hobbies" value="Sports"></input>
        <lable for="hobbies">Sports</lable><br>
        <input type="checkbox" id="hobbies" name="hobbies" value="Music"></input>
        <lable for="hobbies">Music</lable><br><br>
        <lable for="address">Address:</lable>
        <address> 
        <textarea type="text" id="address" cols="40" rows="7" placeholder="Enter your address"></textarea>
        </address><br><br>
        <lable>Profile Photo:</lable><br>
        <input type="file"></input><br><br>
        <button type="submit">Submit</button>
        <button type="resent">Resent</button>
    </form>
</body>
</html>
