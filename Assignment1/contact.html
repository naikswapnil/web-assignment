<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <form> 
            <h1 style="border: 2px solid rgb(25, 23, 21); text-align: center;">CONTACT US</h1>
<label for="fullname">Name:</label><br><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" style="width: 400px;"><br><br>

            <label for="email">Email:</label><br><br>
            <input type="email" id="email" name="email" placeholder="Enter your Email" style="width: 400px;"><br><br>

            <label for="phone number">Phone Number:</label><br><br>
            <input type="tel" id="phone number" name="phone number" placeholder="Enter your phone number" style="width: 400px;"><br><br>

            <label for="subject">Subject:</label><br><br>
            <input type="text" id="subject" name="subject" placeholder="Enter your Subject" style="width: 400px;"><br><br>

              <label for="city">City:</label><br>
              <select name="city" id="city">
                <option selected> select city</option>
                <option>Nanded</option>
                <option>Pune</option>
                <option>Nagpur</option>
                <option>Nashik</option>
                <option>Mumbai</option>
              </select><br><br>
              <label for="message">Message</label> <br>
            <textarea id="message" name="message" cols="40" rows="5" placeholder="Enter any message"></textarea><br><br>

            <button>Send message</button>
            <button>Clear</button>
            
            
        </form>
        
    </fieldset>
    
</body>
</html>
