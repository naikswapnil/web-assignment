<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css selector</title>
    <style>
        div{
            background-color: red;
        }
        .red{
            background-color: red;
        }
        #green{
            background-color: green;
            opacity: 0.5;
        }
        div > p {
            color: blue;
            background-color: brown;

        }
         div  p {
            color: blue;
            background-color: brown;

        }
        * {
            margin: 0;
            padding: 0;
            background-image: url(banner.jpg.jpeg) ;
            width: 500px;
           
            background-repeat: no-repeat;
             background-size: cover;
            background-position: center;
              background-attachment: fixed;

             
              
           
        }
        a:visited{
            color: yellow;
        }
         a:link{
            color: green;
        }
        a:active{
            background-color: red;
        }
         a:hover{
            background-color: yellow;
        }
        p:first-child{
            background-color: aqua;
        }


    </style>
</head>
<body>
      <main class="one">
        <p>i am first </p>
        <p>i am second</p>
      </main>
      <div class="red">
        i am a div
        <article>
            <p>i am a para inside div</p>
        </article>
      </div>
      <div id="green">
        i am another div
      </div>
      <a href="https://web.whatsapp.com/">Go To whatsapp</a><br>
      <a href="https://chatgpt.com/"> Go TO Chatgpt</a>

</body>
</html>
