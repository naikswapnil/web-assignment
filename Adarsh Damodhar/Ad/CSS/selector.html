     <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSS Selectors</title>

<style>

/* Universal Selector */
*{
    margin: 5px;
}

/* Element Selector */
p{
    color: green;
}

/* Class Selector */
.internal{
    background-color: lightblue;
}

/* ID Selector */
#special{
    color: red;
}

/* Group Selector */
h1,h2{
    text-align: center;
}

/* Child Selector */
div > p{
    border: 5px solid black;
}

/* Descendant Selector */
.container p{
    background-color: lightyellow;
}

/* Adjacent Sibling Selector */
h2 + p{
    color: purple;
}

/* General Sibling Selector */
h2 ~ p{
    font-style: italic;
}

/* Attribute Selector */
input[type="text"]{
    background-color: lightgray;
}

/* Hover Selector */
button:hover{
    background-color: black;
    color: white;
}

/* First Child */
li:first-child{
    color: red;
}

/* Last Child */
li:last-child{
    color: blue;
}

/* Nth Child */
li:nth-child(2){
    color: orange;
}

/* Focus Selector */
input:focus{
    border: 1px solid green;
}

/* Active Selector */
button:active{
    background-color: orange;
}

/* Checked Selector */
input:checked{
    width: 20px;
}

/* Not Selector */
p:not(.skip){
    font-size: 18px;
}

/* Before Selector */
h1::before{
    content: "★ ";
}

/* After Selector */
h1::after{
    content: " ★";
}

/* First Letter */
p::first-letter{
    font-size: 25px;
}

/* First Line */
p::first-line{
    color: brown;
}

</style>

</head>

<body>

<h1>Cascading Style Sheets</h1>

<p>There are three types of CSS</p>

<ol>
<li>Inline CSS</li>
<li>Internal CSS</li>
<li>External CSS</li>
</ol>

<!-- Inline CSS -->
<div>
<p style="color:black;background-color:lightgray;">
Inline CSS Example
</p>
</div>

<!-- Internal -->
<div class="internal">
<p>Internal CSS Example</p>
<p id="special">ID Selector Example</p>
</div>

<!-- Descendant -->
<div class="container">
<p>Descendant Selector Example</p>
</div>

<!-- Sibling -->
<h2>Sibling Selector</h2>

<p>Adjacent Sibling Example</p>

<p>General Sibling Example</p>

</body>
</html>
