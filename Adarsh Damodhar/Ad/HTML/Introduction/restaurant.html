<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restaurant menu card</title>
    <h1 align="center">Restaurant Menu Card</h1>
</head>
<body>
    <fieldset>
          <table border="1" align="center" cellpadding="10">
            <tr>
                <th>image</th>
                <th>item</th>
                <th>price</th>
            </tr>
            <tr>
                <td> <img src="pizzaimg.jpg" width="200" height="150"></td>
                <td>pizza</td>
                <td>$500</td>
            </tr>
            <tr>
                  <td> <img src="burgerimg.jpg" width="200" height="150"></td>
                <td>burger</td>
                <td>$250</td>
            </tr>
            <tr>
                 <td> <img src="sandwichimg.jpg" width="200" height="150"></td>
                <td>sandwich</td>
                <td>$150</td>
            </tr>
            <tr>
                <td> <img src="coldimg.jpg" width="200" height="150"></td>
                <td>cold drink</td>
                <td>$1000</td>
            </tr>
            
          </table>


    </fieldset>
</body>
</html>
