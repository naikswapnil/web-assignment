<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML form</title>
    <h1>HTML form</h1>
</head>

<body>
    <fieldset>
        <form action="/submit.php" method="get">

            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Enter Your First Name"><br><br>
            
            <label for="lname">Last Name:</label>

            <input type="text" id="lname" name="lname" placeholder="Enter Your Last Name"><br><br>
            <label for="email">Email:</label>

            <input type="email" id="email" name="email" placeholder="Enter Your Email"><br><br>
            <label for="password">Password:</label>

            <input type="password" id="password" name="password" placeholder="Enter Your Password"><br><br>
            <input type="submit" value="Submit">

            <input type="reset" value="Forget">
            <input type="button" value="Back" onclick="alert('Button Clicked!')">
    
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Allow Permissions</label><br><br>

            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="10" cols="55">Enter your address here...</textarea><br><br>

            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="india">India</option>
                <option value="usa">USA</option>
                <option value="uk">UK</option>
                <option value="australia">Australia</option>
                <option value="canada">Canada</option>
                <option value="germany">Germany</option>
                <option value="france">France</option>
                <option value="japan">Japan</option>
                <option value="china">China</option>
                <option value="brazil">Brazil</option>
                <option value="southafrica">South Africa</option>
                <option value="italy">Italy</option>
                <option value="spain">Spain</option>
                <option value="netherlands">Netherlands</option>
                <option value="sweden">Sweden</option>
                <option value="switzerland">Switzerland</option>
                <option value="norway">Norway</option>
                <option value="denmark">Denmark</option>
                <option value="finland">Finland</option>
                <option value="ireland">Ireland</option>
                <option value="newzealand">New Zealand</option>
                <option value="singapore">Singapore</option>
                <option value="southkorea">South Korea</option>
                <option value="hongkong">Hong Kong</option>
                <option value="uae">UAE</option>

                <fencedframeture value="other">Other</option>



              </select><br><br>

        </form>
    </fieldset>
</body>

</html>
