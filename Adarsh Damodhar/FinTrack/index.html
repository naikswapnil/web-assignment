<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FinTrack Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body>
<div id="loader">
    <div class="loader-box">
        <div class="spinner"></div>
        <h2>FinTrack Pro</h2>
        <p>Loading Dashboard...</p>
    </div>
</div>

<div id="main-content" style="display:none;">
    <header><h1>FinTrack Pro</h1><button id="themeToggle">🌙</button></header>
    <div class="stats"><div><h3>Balance</h3><p id="bal">0</p></div><div><h3>Income</h3><p id="inc">0</p></div><div><h3>Expense</h3><p id="exp">0</p></div></div>
    <form id="f"><input id="desc" placeholder="Description" required><input id="amt" type="number" placeholder="Amount" required><select id="type"><option>Income</option><option>Expense</option></select><button>Add</button></form>
    <input id="search" placeholder="Search">
    <ul id="list"></ul>
    <canvas id="chart"></canvas>
</div>
<script src="script.js"></script></body></html>
