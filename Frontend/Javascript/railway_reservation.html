<!DOCTYPE html>
<html>
<head>
    <title>Railway Reservation System</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,select{
            width:100%;
            padding:10px;
            margin:8px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        #result{
            margin-top:20px;
            line-height:1.8;
        }
    </style>
</head>
<body>

<div class="container">

<h2>🚆 Railway Reservation System</h2>

<label>Source Station</label>
<input type="text" id="source" placeholder="Mumbai">

<label>Destination Station</label>
<input type="text" id="destination" placeholder="Delhi">

<label>Travel Class</label>
<select id="travelClass">
    <option value="500">Sleeper - ₹500</option>
    <option value="1000">AC 3 Tier - ₹1000</option>
    <option value="1500">AC 2 Tier - ₹1500</option>
</select>

<label>Number of Passengers</label>
<input type="number" id="passengers">

<label>Age</label>
<input type="number" id="age">

<br>

<input type="checkbox" id="tatkal">
Tatkal Booking (+₹200)

<br><br>

<button onclick="bookTicket()">
Book Ticket
</button>

<div id="result"></div>

</div>

<script>

function bookTicket()
{
    let source = document.getElementById("source").value;
    let destination = document.getElementById("destination").value;
    let fare = Number(document.getElementById("travelClass").value);
    let passengers = Number(document.getElementById("passengers").value);
    let age = Number(document.getElementById("age").value);
    let tatkal = document.getElementById("tatkal").checked;

    if(source=="" || destination=="")
    {
        alert("Enter stations");
        return;
    }

    if(passengers <= 0)
    {
        alert("Invalid passenger count");
        return;
    }

    // Seat availability
    let availableSeats = 100;

    if(passengers > availableSeats)
    {
        document.getElementById("result").innerHTML =
        "<h3 style='color:red'>Seats Not Available</h3>";
        return;
    }

    let total = fare * passengers;

    // Senior citizen discount
    if(age >= 60)
    {
        total -= total * 0.30;
    }

    // Tatkal charge
    if(tatkal)
    {
        total += 200 * passengers;
    }

    document.getElementById("result").innerHTML = `
        <h3>🎟 Ticket Details</h3>

        Source : ${source}<br>

        Destination : ${destination}<br>

        Passengers : ${passengers}<br>

        Senior Citizen : ${age >= 60 ? "Yes" : "No"}<br>

        Tatkal Booking : ${tatkal ? "Yes" : "No"}<br>

        <hr>

        <h2>Total Fare : ₹${total.toFixed(2)}</h2>
    `;
}

</script>

</body>
</html>
