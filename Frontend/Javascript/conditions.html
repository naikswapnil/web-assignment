<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditions</title>
    <h1>If else conditions</h1>
</head>
<body>
    <div id="student">
        <p id="status">Students Pass or Fail Status</p>

        <form method="post" action="conditions.html">
            <label>Enter your percent</label><br> 
            <input type="number" name="percent" id="percent"><br> <br> 
            <input type="button" name="submit" id="submit" onclick="passStatus();" value="Submit">
        </form>
        <div id="result">
           <p id="result_status"></p>
        </div>
    </div>
    <script>
        function passStatus(){
   
        let percent;
         
        percent = document.getElementById("percent").value;
       
        console.log(percent);
        if(percent>=60){
            document.getElementById("result_status").innerHTML = "Students Pass or Fail Status: First Class";
        }
        else if(percent>=35 && percent < 60){
            document.getElementById("result_status").innerHTML = "Students Pass or Fail Status: Second Class";
        }
        else{
            document.getElementById("result_status").innerHTML = "Students Pass or Fail Status: Fail";
        }
    }
    </script>
</body>
</html>
