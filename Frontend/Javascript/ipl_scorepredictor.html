<!DOCTYPE html>
<html>
<head>
    <title>IPL Score Predictor</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            line-height:1.8;
            font-size:18px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🏏 IPL Score Predictor</h2>

    <input type="number" id="score" placeholder="Current Score">

    <input type="number" step="0.1" id="overs"
           placeholder="Overs Completed (Example: 10.3)">

    <button onclick="predictScore()">
        Predict Score
    </button>

    <div id="result"></div>

</div>

<script>

function predictScore()
{
    let score = Number(document.getElementById("score").value);
    let overs = Number(document.getElementById("overs").value);

    if(score <= 0 || overs <= 0 || overs > 20)
    {
        document.getElementById("result").innerHTML =
        "Please enter valid values.";
        return;
    }

    let runRate = score / overs;

    let predictedScore = Math.round(runRate * 20);

    let status = "";

    if(runRate < 7)
    {
        status = "Slow Innings 🐢";
    }
    else if(runRate < 9)
    {
        status = "Good Innings 👍";
    }
    else
    {
        status = "Explosive Batting 🚀";
    }

    document.getElementById("result").innerHTML = `
        Current Score : <b>${score}</b><br>
        Overs Completed : <b>${overs}</b><br>
        Current Run Rate : <b>${runRate.toFixed(2)}</b><br>
        Predicted Score : <b>${predictedScore}</b><br>
        Match Situation : <b>${status}</b>
    `;
}

</script>

</body>
</html>
