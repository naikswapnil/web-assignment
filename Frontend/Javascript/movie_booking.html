<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Ticket Booking System</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
    }

    .container{
        width:500px;
        margin:50px auto;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        color:#333;
    }

    label{
        display:block;
        margin-top:15px;
        font-weight:bold;
    }

    input,select{
        width:100%;
        padding:10px;
        margin-top:5px;
        box-sizing:border-box;
    }

    .checkbox{
        width:auto;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:20px;
        background:green;
        color:white;
        border:none;
        font-size:18px;
        cursor:pointer;
        border-radius:5px;
    }

    button:hover{
        background:darkgreen;
    }

    #result{
        margin-top:20px;
        background:#f9f9f9;
        padding:15px;
        border-radius:10px;
        line-height:1.8;
    }
</style>
</head>
<body>

<div class="container">

    <h2>🎬 Movie Ticket Booking</h2>

    <label>Select Movie</label>
    <select id="movie">
        <option value="250">Avengers - ₹250</option>
        <option value="300">Pushpa 2 - ₹300</option>
        <option value="200">Sitaare Zameen Par - ₹200</option>
    </select>

    <label>Seat Type</label>
    <select id="seatType">
        <option value="0">Silver Seat</option>
        <option value="100">Gold Seat (+₹100)</option>
        <option value="300">Recliner Seat (+₹300)</option>
    </select>

    <label>Show Time</label>
    <select id="showTime">
        <option>Morning</option>
        <option>Evening</option>
        <option>Night</option>
    </select>

    <label>Day</label>
    <select id="day">
        <option>Weekday</option>
        <option>Weekend</option>
    </select>

    <label>Number of Tickets</label>
    <input type="number" id="tickets">

    <label>Coupon Code</label>
    <input type="text" id="coupon" placeholder="SAVE100">

    <br><br>

    <input type="checkbox" class="checkbox" id="student">
    Student Discount (20%)

    <br><br>

    <button onclick="bookTicket()">Book Ticket</button>

    <div id="result"></div>

</div>

<script>

function bookTicket()
{
    let moviePrice = Number(document.getElementById("movie").value);
    let seatPrice = Number(document.getElementById("seatType").value);
    let showTime = document.getElementById("showTime").value;
    let day = document.getElementById("day").value;
    let tickets = Number(document.getElementById("tickets").value);
    let coupon = document.getElementById("coupon").value.toUpperCase();
    let student = document.getElementById("student").checked;

    if(tickets <= 0)
    {
        alert("Please enter valid number of tickets");
        return;
    }

    let pricePerTicket = moviePrice + seatPrice;

    let total = pricePerTicket * tickets;

    // Evening show extra charge
    if(showTime == "Evening")
    {
        total += tickets * 50;
    }

    // Night show extra charge
    if(showTime == "Night")
    {
        total += tickets * 100;
    }

    // Weekend surcharge
    if(day == "Weekend")
    {
        total += total * 0.10;
    }

    // Student discount
    if(student)
    {
        total -= total * 0.20;
    }

    // Coupon code
    if(coupon == "SAVE100")
    {
        total -= 100;
    }

    if(total < 0)
    {
        total = 0;
    }

    document.getElementById("result").innerHTML = `
        <h3>🎟 Booking Summary</h3>

        Price Per Ticket : ₹${pricePerTicket}<br>

        Number of Tickets : ${tickets}<br>

        Show Time : ${showTime}<br>

        Day : ${day}<br>

        Student Discount : ${student ? "Applied" : "No"}<br>

        Coupon Code : ${coupon=="" ? "None" : coupon}<br>

        <hr>

        <h2>Total Amount : ₹${total.toFixed(2)}</h2>
    `;
}

</script>

</body>
</html>
