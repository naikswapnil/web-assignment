<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
    <h1>For Loops</h1>
</head>
<body>
    <div id="loops">
        <p id="values">
            Values Entered
        </p>
    </div>
    <script>
        document.getElementById("values").innerHTML =  "Values:";
        let i;
     
        for(i=0;i<=10;i++)
    {
        document.getElementById("values").innerHTML += i+"<br>";
    }
    console.log(i);
    
    </script>
</body>
</html>
