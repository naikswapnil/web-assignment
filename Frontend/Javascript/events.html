<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javscript events</title>
    <h1>Javscript events</h1>
</head>
<body>
    <div class="container">
      <form>
        <label>Enter Name: </label>
        <input type="text" id="name" name="name" onchange="displayname()"> <br>
        <span id="error" style="color:red;"></span> <br>
         <span id="success" style="color:green;"></span> <br

         <label>Enter Email: </label>
          <input type="email" id="email" name="email"> <br><br>

         <label>Enter Password: </label>
          <input type="pasword" id="password" name="password"> <br>

          <button type="button">Submit</button>
      </form>
    </div>
    <script>
        function displayname(){
            let name = document.getElementById("name").value;
            let error = document.getElementById("error");
            //  debugger;
            let success = document.getElementById("success");
            if(name == "")
           {
               error.innerHTML = "Name should not be empty";
               success.innerHTML = "";
               
          }
          else
          {
              success.innerHTML = "Good! You have entered your name";
              error.innerHTML = "";
          }
            
        }
     
    </script>
</body>
</html>
