<!DOCTYPE html>
<html>
<head>
    <title>Cricket Scoreboard</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        .container{
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1{
            color: #006400;
        }

        #score{
            font-size: 40px;
            margin: 20px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        #message{
            color: red;
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🏏 Cricket Scoreboard</h1>

    <h2 id="score">0 / 0</h2>

    Overs: <span id="overs">0.0</span>

    <br><br>

    <button onclick="addRuns(1)">1 Run</button>
    <button onclick="addRuns(2)">2 Runs</button>
    <button onclick="addRuns(3)">3 Runs</button>
    <button onclick="addRuns(4)">4 Runs</button>
    <button onclick="addRuns(6)">6 Runs</button>

    <br><br>

    <button onclick="dotBall()">Dot Ball</button>
    <button onclick="wicket()">Wicket</button>
    <button onclick="resetMatch()">Reset</button>

    <h3 id="message"></h3>

</div>

<script>

let runs = 0;
let wickets = 0;
let balls = 0;

function updateScore() {

    let overs = Math.floor(balls / 6) + "." + (balls % 6);

    document.getElementById("score").innerHTML =
        runs + " / " + wickets;

    document.getElementById("overs").innerHTML = overs;
}

function addRuns(run) {

    if (wickets == 10) {
        document.getElementById("message").innerHTML =
            "Innings Over!";
        return;
    }

    runs += run;
    balls++;

    updateScore();
}

function dotBall() {

    if (wickets == 10) {
        document.getElementById("message").innerHTML =
            "Innings Over!";
        return;
    }

    balls++;

    updateScore();
}

function wicket() {

    if (wickets < 10) {
        wickets++;
        balls++;

        if (wickets == 10) {
            document.getElementById("message").innerHTML =
                "All Out!";
        }
    }

    updateScore();
}

function resetMatch() {

    runs = 0;
    wickets = 0;
    balls = 0;

    document.getElementById("message").innerHTML = "";

    updateScore();
}

</script>

</body>
</html>
