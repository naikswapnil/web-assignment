<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .item1{
          width:500px;
          height:100px;
          background-color: orange;
          margin-top: 10px;
          border:1px solid black;
        }
        .item2{
          position:relative;
          width:500px;
          height:100px;
          background-color: whitesmoke;
          margin-top: 5px; 
          border:1px solid black;
        }
        .item3{
          position: relative;
          width:500px;
          height:100px;
          background-color:green;
          margin-top: 100px;  
          border:1px solid black;
        }
        .item{
            position:sticky;
           width:500px;
          height:100px;
          background-color:blue;
          margin-top: 100px;  
          border:1px solid black;
        }
        .parent{
            border:1px solid black;
        }
    </style>
    <h1>Positions: Absolute,relative,Sticky,fixed</h1>
</head>
<body>
    <div class="item">

    </div>
 <div class="parent">
    <div class="item1">
      
    </div>
    <div class="item2">
        
    </div>
    <div class="item3">
        
    </div>
    </div>
</body>
</html>
