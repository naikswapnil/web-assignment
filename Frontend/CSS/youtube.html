<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Dark Mode</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* Navbar */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#0f0f0f;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid #222;
    z-index:1000;
}

.logo{
    font-size:25px;
    font-weight:bold;
}

.logo span{
    color:red;
}

.search-box{
    width:500px;
}

.search-box input{
    width:100%;
    background:#121212;
    border:1px solid #333;
    color:white;
    padding:12px 20px;
    border-radius:30px;
}

.user-icon{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#8b5cf6;
}

/* Sidebar */

.sidebar{
    position:fixed;
    top:60px;
    left:0;
    width:90px;
    height:100%;
    background:#0f0f0f;
    border-right:1px solid #222;
    padding-top:20px;
}

.menu{
    width:40px;
    height:40px;
    background:#202020;
    margin:15px auto;
    border-radius:8px;
}

/* Main Section */

.main{
    margin-left:100px;
    margin-top:80px;
    padding:20px;
}

/* Category chips */

.categories{
    display:flex;
    gap:15px;
    overflow-x:auto;
    margin-bottom:30px;
}

.chip{
    background:#202020;
    padding:10px 18px;
    border-radius:16px;
    cursor:pointer;
}

.chip.active{
    background:white;
    color:black;
}

/* Video Grid */

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:25px;
}

/* Video Card */

.video-card{
    cursor:pointer;
}

.thumbnail{
    width:100%;
    height:160px;
    border-radius:12px;
}

.blue{
    background:#4285f4;
}

.green{
    background:#10b981;
}

.pink{
    background:#ec4899;
}

.video-info{
    display:flex;
    margin-top:12px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    margin-right:12px;
}

.red{
    background:#ef4444;
}

.yellow{
    background:#facc15;
}

.sky{
    background:#3b82f6;
}

.video-details h4{
    font-size:15px;
    margin-bottom:5px;
}

.video-details p{
    color:#aaaaaa;
    font-size:13px;
    line-height:20px;
}

/* Responsive */

@media(max-width:768px){

    .search-box{
        width:200px;
    }

    .sidebar{
        width:70px;
    }

    .main{
        margin-left:80px;
    }
}
</style>
</head>
<body>

<!-- Navbar -->

<div class="navbar">

    <div class="logo">
        ▶ <span>YouTube</span>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search">
    </div>

    <div class="user-icon"></div>

</div>


<!-- Sidebar -->

<div class="sidebar">
    <div class="menu"></div>
    <div class="menu"></div>
    <div class="menu"></div>
</div>


<!-- Main Content -->

<div class="main">

    <!-- Category Chips -->

    <div class="categories">
        <div class="chip active">All</div>
        <div class="chip">Gaming</div>
        <div class="chip">Music</div>
        <div class="chip">Live</div>
        <div class="chip">Programming</div>
    </div>

    <!-- Videos -->

    <div class="video-grid">

        <!-- Card 1 -->

        <div class="video-card">

            <div class="thumbnail blue"> <img src="download.jpg" style="height:160px;width:300px;"></div>

            <div class="video-info">

                <div class="avatar red"></div>

                <div class="video-details">
                    <h4>Learn HTML & CSS</h4>
                    <p>Tech Channel</p>
                    <p>120K views · 2 days ago</p>
                </div>

            </div>

        </div>


        <!-- Card 2 -->

        <div class="video-card">

            <div class="thumbnail green"><img src="travel.jpg" style="height:160px;width:300px;"></div>

            <div class="video-info">

                <div class="avatar yellow"></div>

                <div class="video-details">
                    <h4>Building a Travel App</h4>
                    <p>Code Master</p>
                    <p>45K views · 5 hours ago</p>
                </div>

            </div>

        </div>


        <!-- Card 3 -->

        <div class="video-card">

            <div class="thumbnail pink"><img src="radio.jpg" style="height:160px;width:300px;"></div>

            <div class="video-info">

                <div class="avatar sky"></div>

                <div class="video-details">
                    <h4>Lofi Hip Hop Radio</h4>
                    <p>Chill Vibes</p>
                    <p>14K watching</p>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
