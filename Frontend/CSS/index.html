<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 80vw;
            height: 433px;
            padding:3px;
            margin:3px;
            border: 2px solid black;
        }
        .box1{
            top:0px;
            left:100px;
            position: sticky;
          background-color: lightcoral;
           
        }
        .box2{
            
            
         background-color: lightgreen;
        }
        .box3{
          background-color: lightyellow;
        }
        .box4{
            
          background-color: lightpink;
        }
        .parent{
            padding: 20px;
            margin: 20px;
            position: absolute;
            border: 2px solid black;
            outline: 5px solid orange;
        }
        p{
            color:white;
            text-align: justify;
        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1">
      <p>Paragraph for box1</p>
    </div>
    <div class="box box2">

    </div>
    <div class="box box3">

    </div>
    <div class="box box4"> 

    </div>
    </div>
    
</body>
</html>
