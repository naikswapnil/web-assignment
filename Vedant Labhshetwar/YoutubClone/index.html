<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">
    
<title>YouTube Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">

<i class="fa-brands fa-youtube"></i>

<span>YouTube</span>

</div>

<div class="search">

<input
type="text"
placeholder="Search">

<button>

<i class="fa fa-search"></i>

</button>

</div>

<div class="user"></div>

</div>


<!-- SIDEBAR -->

<div class="sidebar">

<div></div>

<div></div>

<div></div>

</div>


<!-- CONTENT -->

<div class="content">

<div class="chips">

<button>All</button>

<button>Gaming</button>

<button>Music</button>

<button>Live</button>

</div>


<div class="videos">

<!-- CARD 1 -->

<div class="card">

<img
class="thumbnail"
src="https://picsum.photos/500/280">

<div class="video-info">

<div class="avatar"></div>

<div class="details">

<h3>Learn HTML & CSS</h3>

<p>Tech Channel</p>

<span>120K views • 2 days ago</span>

</div>

</div>

</div>



<!-- CARD 2 -->

<div class="card">

<img
class="thumbnail"
src="https://picsum.photos/501/280">

<div class="video-info">

<div class="avatar"></div>

<div class="details">

<h3>Building a Travel App</h3>

<p>Code Master</p>

<span>45K views • 5 hours ago</span>

</div>

</div>

</div>



<!-- CARD 3 -->

<div class="card">

<img
class="thumbnail"
src="https://picsum.photos/502/280">

<div class="video-info">

<div class="avatar"></div>

<div class="details">

<h3>Lofi Hip Hop Radio</h3>

<p>Chill Vibes</p>

<span>14K watching</span>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
