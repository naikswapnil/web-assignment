<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>

    <style>
        /* Element Selector */
        div{
            background-color: red;
        }
        /*class Selector */
        .red{
             background-color: red;
             opacity: 0.8;
        }

        /* ID Selector */
        #green{
            background-color: green;
        }

        /* Child Selector */

        div > p{
    border: 5px solid black;
        }

        /* Descendant Selector */
        div p{
            color:blue;
            background-color: rgb(180, 151, 151);
        }

        /* universal Selector */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-image: url(image.jpeg);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Peseudo Selector */
        A:visited{
            color: rgb(80, 247, 9);
        }

        a:link {
            color: green;
        }

        a:active{
            background-color: red;
        }

        a:hover{
            background-color: yellow;
        }

        p:first-child{
            background-color: aqua;
        }

    </style>
</head>
<body>
    
</body>
<main class="one">
    <p>I am first</p>
    <p>I am second</p>
</main>

<div class="red">
    I am a div

    <article>
        <p>I am a para inside div</p>
    </article>

</div>

<div id="green">
    I am another div
</div>

<a href="https://www.google.com">
    Go to Google
</a>

<a href="https://www.facebook.com/">
    Go to Facebook
</a>
</html>
