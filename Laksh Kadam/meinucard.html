<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu Card</title>
    <h1>RESTAURANT MENU CARD</h1>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10">
        <tr>
            <th>Dish Name</th>
            <th>Description</th>
            <th>Price</th>
        </tr>
        <tr>
            <td><img src="Margherita Pizza.jpeg" width="100" height="100"></td>
            <td>Classic pizza with tomato sauce, mozzarella cheese, and fresh basil.</td>
            <td>120%</td>
        </tr>
        <tr>
            <td><img src="Spaghetti Carbonara.jpeg" alt="Spaghetti Carbonara" width="100" height="100"></td>
            <td>Traditional Italian pasta dish with eggs, cheese, pancetta, and pepper.</td>
            <td>140%</td>
        </tr>
        <tr>
            <td><img src="Caesar Salad.jpeg" alt="Caesar Salad" width="100" height="100"></td>
            <td>Crisp romaine lettuce tossed with Caesar dressing, croutons, and Parmesan cheese.</td>
            <td>100</td>
        </tr>

</body>
</html>
