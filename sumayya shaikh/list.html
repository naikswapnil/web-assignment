<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html list</title>
    <!--unordered list-->
</head>
<body>
    <h1>HTML List</h1>
    <!--unordered list-->
    <h2>--unordered list--</h2>
    <ul>
        <li>milk</li>
        <li>tea</li>
        <li>coffee</li>
    </ul>
    <!--ordered list-->
    <h2>--ordered--</h2>
    <ol>
        <li>milk</li>
        <li>tea</li>
        <li>coffee</li>
    </ol>
    <h2>--description list--</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup language</dd>
        <dt>CSS</dt>
    <dd>cascading style sheets</dd>
    <dt>JS</dt>
    <dd>javascript</dd>
 </dl>
 <dl>
    <dt>tea</dt>
    <dd>A hot tea</dd>
    <dt>milk</dt>
    <dd>A white drink</dd>
    <dt>coffee</dt>
    <dd>A cold drink</dd>
 </dl>
</body>
</html>
