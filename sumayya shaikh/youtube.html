<!DOCTYPE html>
<html>
<head>
<title>YouTube Clone</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

.navbar{
height:60px;
background:#0f0f0f;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
position:fixed;
width:100%;
top:0;
border-bottom:1px solid #333;
}

.logo{
font-size:25px;
font-weight:bold;
color:red;
}

.search{
width:40%;
padding:10px;
border-radius:20px;
border:1px solid #555;
background:#121212;
color:white;
}

.profile{
width:35px;
height:35px;
border-radius:50%;
background:purple;
}

.sidebar{
position:fixed;
top:60px;
left:0;
width:80px;
height:100%;
background:#0f0f0f;
}

.sidebar div{
padding:20px;
text-align:center;
}

.content{
margin-left:90px;
margin-top:80px;
padding:20px;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
cursor:pointer;
}

.thumbnail{
width:100%;
height:180px;
border-radius:10px;
background-size:cover;
background-position:center;
}

.info{
display:flex;
margin-top:10px;
}

.channel{
width:40px;
height:40px;
border-radius:50%;
background:red;
margin-right:10px;
}

.title{
font-weight:bold;
}
</style>

</head>
<body>

<div class="navbar">
<div class="logo">▶️ YouTube</div>
<input type="text" class="search" placeholder="Search">
<div class="profile"></div>
</div>

<div class="sidebar">
<div>🏠</div>
<div>🎬</div>
<div>📺</div>
</div>

<div class="content">

<div class="videos">

<div class="card">
<div class="thumbnail"
style="background-image:url('https://picsum.photos/400/250?1');">
</div>

<div class="info">
<div class="channel"></div>

<div>
<div class="title">Learn HTML & CSS</div>
<p>Tech Channel • 120K views</p>
</div>
</div>
</div>

<div class="card">
<div class="thumbnail"
style="background-image:url('https://picsum.photos/400/250?2');">
</div>

<div class="info">
<div class="channel"></div>

<div>
<div class="title">Building a Travel App</div>
<p>Code Master • 45K views</p>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
