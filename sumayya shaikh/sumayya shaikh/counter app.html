<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:100px;
        }

        h1{
            font-size:50px;
        }

        button{
            padding:10px 20px;
            font-size:18px;
            margin:5px;
            cursor:pointer;
        }

        .increase{
            background-color:green;
            color:white;
        }

        .decrease{
            background-color:red;
            color:white;
        }

        .reset{
            background-color:blue;
            color:white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Counter App</h2>

        <h1 id="count">0</h1>

        <button class="increase" onclick="increaseCount()">
            Increase
        </button>

        <button class="decrease" onclick="decreaseCount()">
            Decrease
        </button>

        <button class="reset" onclick="resetCount()">
            Reset
        </button>
    </div>

    <script>

        let count = 0;

        function increaseCount()
        {
            count++;
            document.getElementById("count").innerHTML = count;
        }

        function decreaseCount()
        {
            count--;
            document.getElementById("count").innerHTML = count;
        }

        function resetCount()
        {
            count = 0;
            document.getElementById("count").innerHTML = count;
        }

    </script>

</body>
</html>
