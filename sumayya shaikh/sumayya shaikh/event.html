<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>event html</title>
    <h1>event html</h1>
</head>
<body>
    <div>
        <label> enter name:</label>
        <input type="name" id="name" name="name"><br><br>


        <label> enter email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label> enter password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label> enter button:</label>
        <input type="button" id="button" name="button"
    </div>
    <script>
        document.getElementById("name").addEventListener("click",function(){
            // function addtocart(){
            alert("add to cart");
        });
        document.getElementById("email").addEventListener("change",function(){
            alert("email change event applied");
        });

        document.getElementById("password").addEventListener("focus",function(){
            alert("password focus event applied");
        });

        document.getElementById("button").addEventListener("click",function(){
            alert("button  click event applied");
        });
    </script>
</body>
</html>
