 <!DOCTYPE html>
<html>
<head>
<style>

.solid{
    border:3px solid red;
    padding:10px;
    margin:10px;
}

.dashed{
    border:3px dashed blue;
    padding:10px;
    margin:10px;
}

.dotted{
    border:3px dotted green;
    padding:10px;
    margin:10px;
}

.double{
    border:5px double purple;
    padding:10px;
    margin:10px;
}

.groove{
    border:5px groove orange;
    padding:10px;
    margin:10px;
}

.ridge{
    border:5px ridge brown;
    padding:10px;
    margin:10px;
}

.inset{
    border:5px inset black;
    padding:10px;
    margin:10px;
}

.outset{
    border:5px outset rgb(31, 15, 172);
    padding:200px;
    margin:20px;
}

.none{
    border:none;
    padding:10px;
    margin:10px;
    background-color:lightgray;
}

</style>
</head>

<body>

<div class="solid">this is a solid property </div>

<div class="dashed">Dashed Border property</div>

<div class="dotted">Dotted Border</div>

<div class="double">Double Border</div>

<div class="groove">Groove Border</div>

<div class="ridge">Ridge Border</div>

<div class="inset">Inset Border</div>

<div class="outset">Outset Border</div>

<div class="none">No Border</div>

</body>
</html>
