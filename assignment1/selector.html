<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css selector</title>
    <h1>css selector</h1>
<style>
    /* Element selector */
    div{
        background-color:red;
    }
    /* class selector */
    .red{
        background-color:red;
    }
    /*id selector */
    #green{
        background-color:green;
    }
    /*child selector */
    div > p{
        color:blue;
        background-color:brown;
    }
    
</style>
</head>
<body>
    
    <main class=""one">
        <p> i am frist</p>
        <p>i am second</p>
    
    </main>
    <div class="red">
     i am a div
<article>
    <p> i am a para inside div</p>
</article>
    </div>
    <div id="green">
        i am another div
        </div>
</body>
</html>
