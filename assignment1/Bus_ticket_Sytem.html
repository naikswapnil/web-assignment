<!DOCTYPE html>
<html>
<head>
    <title>Bus Ticket Booking System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:350px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:darkgreen;
        }

        #result{
            margin-top:20px;
        }

        h3{
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>🚌 Bus Ticket Booking System</h2>

<input type="text" id="name" placeholder="Passenger Name">

<input type="number" id="age" placeholder="Age">

<select id="ticket">
    <option value="">Select Ticket Type</option>
    <option value="300">Regular - ₹300</option>
    <option value="500">AC - ₹500</option>
    <option value="800">Sleeper - ₹800</option>
</select>

<input type="number" id="count" placeholder="Number of Tickets">

<button onclick="bookTicket()">Book Ticket</button>

<div id="result"></div>

</div>

<script>

function bookTicket(){

var name=document.getElementById("name").value;
var age=parseInt(document.getElementById("age").value);
var price=parseInt(document.getElementById("ticket").value);
var count=parseInt(document.getElementById("count").value);

var total=price*count;
var discount=0;

if(age<=10)
{
discount=total*0.50;
}
else if(age>=60)
{
discount=total*0.30;
}

var payable=total-discount;

document.getElementById("result").innerHTML=
"<h3>Ticket Details</h3>"+
"<p><b>Passenger Name :</b> "+name+"</p>"+
"<p><b>Age :</b> "+age+"</p>"+
"<p><b>Number of Tickets :</b> "+count+"</p>"+
"<p><b>Total Amount :</b> ₹"+total+"</p>"+
"<p><b>Discount :</b> ₹"+discount+"</p>"+
"<p><b>Payable Amount :</b> <span style='color:green'><b>₹"+payable+"</b></span></p>";

}

</script>

</body>
</html>
