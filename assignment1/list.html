<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> html lists</h1>
    <!--unordered list-->
    <h2>unordered lists</h2>
    <ul>
        <li>milk</li>
        <li>tea</li>
        <li>cofee</li>
    </ul>
    <!--ordered lists-->
    <h2>ordered list</h2>
    <ol>
        <li>milk</li>
        <li>tea</li>
        <li>cofee</li>
    </ol>
    <h2>--description list--</h2>
    <dl>
  <dt>tea</dt> 
  <dd>hot</dd>  
  <dt>milk</dt>   

  <dd>white dark</dd>
  <dt>cofee</dt>
  <dd>cold drink</dd>
    </dl>
    
</body>
</html>
