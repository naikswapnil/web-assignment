 <!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 30px auto;
        }
        th, td {
            border: 2px solid black;
            padding: 15px;
            text-align: center;
        }
        th {
            font-weight: bold;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

<h2>Expected Output</h2>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Course</th>
        <th>City</th>
    </tr>
    <tr>
        <td>101</td>
        <td>Shivani</td>
        <td>BCA</td>
        <td>Nagpur</td>
    </tr>
    <tr>
        <td>102</td>
        <td>Vanii</td>
        <td>BSc</td>
        <td>Pune</td>
    </tr>
    <tr>
        <td>103</td>
        <td>Savita</td>
        <td>BCom</td>
        <td>Mumbai</td>
    </tr>
</table>

</body>
</html>
