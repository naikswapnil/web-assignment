<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <h1>Contact Us</h1>
</head>
<body>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="Email" required><br><br>

    <label for="phone number">Phone number:</label>
    <input type="tel" id="phone number" name="phone" disabled value="9325524876"><br><br>

    <label for="subject">Subject:</label>
    <input type="text" id="subject" readonly name="subject" value="HTML" style="background-color: white;"><br><br>

    <label for="Dropdown list">City:</label>
    <select name="City">
        <option>Select city</option>
        <option>Hingoli</option>
        <option>Nanded</option>
        <option>Pune</option>
        <option>Aurandabhad</option>
        <option>Mumbai</option>
    </select><br><br>


    <label for="message">Message:</lable><br>
    <textarea name="message" col="30" row="10"></textarea><br><br>

    <input type="submit" value="Send message">

    <input type="button" value="clear"><br><br>

</body>
</html>
