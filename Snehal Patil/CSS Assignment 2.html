<!DOCTYPE html>
<html>
<head>
<title>Facebook Login</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f0f2f5;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:100px;
}

.left h1{
    color:#1877f2;
    font-size:50px;
}

.left p{
    font-size:24px;
}

.right{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:6px;
    box-sizing:border-box;
}

.login{
    width:100%;
    padding:12px;
    background:#1877f2;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
}

.create{
    width:60%;
    padding:12px;
    background:#42b72a;
    color:white;
    border:none;
    border-radius:6px;
    display:block;
    margin:15px auto;
}
</style>
</head>

<body>

<div class="container">

<div class="left">
    <h1>facebook</h1>
    <p>Connect with friends and the world around you on Facebook.</p>
</div>

<div class="right">
    <input type="text" placeholder="Email or Phone">
    <input type="password" placeholder="Password">
    
    <button class="login">Log In</button>
    
    <p align="center">
        <a href="#">Forgotten password?</a>
    </p>
    
    <hr>
    
    <button class="create">Create New Account</button>
</div>

</div>

</body>
</html>
