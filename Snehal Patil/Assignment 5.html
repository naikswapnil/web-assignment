<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Card</title>
    <h1>Restaurant Menu Card</h1>
    <style>
        table,th,td,tr{
            border: 2px solid black;
            border-collapse: collapse;
        
        }
    </style>
</head>
<body>
  <table height="200" width="400">
        <tr>
            <th>Image</th>
            <th>Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td><img src="pizza.avif" alt="Pizza" height="200" width="200"></td>
            <td>Pizza</td>
            <td>250</td>
        </tr>

        <tr>
            <td><img src="burger.jpg" alt="Burger" height="200" width="200"></td>
            <td>Burger</td>
            <td>150</td>
        </tr>
        
        <tr></tr>
            <td><img src="sandwich.avif" alt="Sandwich" height="200" width="200"></td>
            <td>Sandwich</td>
            <td>100</td>
        </tr>
        
        <tr>
            <td><img src="cold drink.png" alt="Cold Drink" height="200" width="200"></td>
            <td>Cold Drink</td>
            <td>50</td>
        </tr>   
</body>
</html>
